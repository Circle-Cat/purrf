name: Promote

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target environment branch
        required: true
        type: choice
        options:
          - staging
          - prod
      commits:
        description: >-
          Upstream commit SHAs to cherry-pick, separated by spaces or commas.
          Leave empty to promote all pending commits. (Used for staging; for
          prod the range is anchored to release_tag instead.)
        required: false
        default: ''
      release_tag:
        description: >-
          PROD ONLY (required for target=prod): the release/<...> tag on staging
          to release. Code is promoted up to this immutable tag, and the image is
          reused verbatim from values-staging.yaml at the tag -- so a staging that
          has moved on to newer batches cannot leak in. Ignored for staging.
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      # Mint an installation token for the GitHub App (same app reused by
      # deploy-test.yml). An app token is a distinct actor, so the PR it opens
      # triggers presubmit -- unlike the built-in github.token, whose PRs leave
      # required checks pending forever. Generated first so checkout uses it and
      # the later push/PR authenticate as the app.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PURRF_BOT_APP_ID }}
          private-key: ${{ secrets.PURRF_BOT_PRIVATE_KEY }}

      # Only members of the purrf-maintainers team may promote to staging/prod.
      # workflow_dispatch already requires write access; this narrows it to the
      # team. github.actor is the triggering user and cannot be spoofed here.
      - name: Authorize actor
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ACTOR: ${{ github.actor }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -o errexit -o pipefail -o nounset
          # Capture both the body and any error (HTTP 403/404) so a failure
          # tells us *why* -- a swallowed error reads as "not a member".
          if ! resp=$(gh api "orgs/$ORG/teams/purrf-maintainers/memberships/$ACTOR" 2>&1); then
            echo "::error::Membership lookup for $ACTOR failed (token/permission or team slug):"
            echo "$resp"
            exit 1
          fi
          state=$(echo "$resp" | jq -r '.state // "unknown"')
          if [ "$state" != "active" ]; then
            echo "::error::$ACTOR is not an active member of purrf-maintainers (state: $state); cannot promote."
            echo "$resp"
            exit 1
          fi
          echo "$ACTOR authorized (state: active)."

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Cherry-pick and open promotion PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET: ${{ inputs.target }}
          COMMITS: ${{ inputs.commits }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
          BRANCH: promote/${{ inputs.target }}-${{ github.run_id }}
        run: |
          set -o errexit -o pipefail -o nounset

          case "$TARGET" in
            staging) UPSTREAM=main ;;
            prod)    UPSTREAM=staging ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Prod releases a validated, tagged staging point and REUSES the image
          # built+tested on staging (prod never rebuilds). Anchor the code range
          # and the image to the immutable tag so a staging that has moved on to
          # newer batches cannot leak into this release.
          if [ "$TARGET" = "prod" ]; then
            if [ -z "$RELEASE_TAG" ]; then
              echo "::error::prod promotion requires release_tag (a release/... tag on staging)."
              exit 1
            fi
            git fetch --tags --force origin
            if ! git rev-parse -q --verify "refs/tags/$RELEASE_TAG^{commit}" >/dev/null; then
              echo "::error::tag '$RELEASE_TAG' not found."
              exit 1
            fi
            if ! git merge-base --is-ancestor "refs/tags/$RELEASE_TAG^{commit}" origin/staging; then
              echo "::error::tag '$RELEASE_TAG' is not on the staging branch."
              exit 1
            fi
            ANCHOR="refs/tags/$RELEASE_TAG"
            IMAGE_TAG=$(git show "$ANCHOR:helm/purrf/values-staging.yaml" | yq '.image.tag')
            if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "null" ]; then
              echo "::error::could not read image.tag from values-staging.yaml at $RELEASE_TAG."
              exit 1
            fi
            export IMAGE_TAG
            echo "Releasing $RELEASE_TAG to prod; reusing staging-tested image tag: $IMAGE_TAG"
          else
            ANCHOR="origin/$UPSTREAM"
          fi

          # Select candidate commits.
          if [ -n "$COMMITS" ]; then
            requested=$(echo "$COMMITS" | tr ',' ' ')
            for sha in $requested; do
              if ! git merge-base --is-ancestor "$sha" "$ANCHOR"; then
                echo "::error::$sha is not contained in $ANCHOR."
                exit 1
              fi
            done
            # Oldest first, so dependencies apply before their dependents.
            candidates=$(git rev-list --reverse --no-walk $requested)
          else
            # Every commit on the anchor whose patch is not yet on the target.
            candidates=$(git cherry "origin/$TARGET" "$ANCHOR" | awk '$1 == "+" { print $2 }')
          fi

          # Drop env-local image-pin commits: a single commit touching only some
          # helm/purrf/values-*.yaml. They are created in-branch by the deploy
          # workflows (no cherry-pick trailer), are specific to one environment,
          # and would be rejected by promotion-guard on the target.
          picks=""
          for sha in $candidates; do
            changed=$(git diff-tree --no-commit-id --name-only -r "$sha")
            if [ "$(printf '%s\n' "$changed" | grep -c .)" -eq 1 ] \
               && printf '%s\n' "$changed" | grep -qE '^helm/purrf/values-[a-z]+\.yaml$'; then
              echo "Skipping env image-pin commit: $(git log -1 --format='%h %s' "$sha")"
              continue
            fi
            picks="$picks $sha"
          done

          git checkout -b "$BRANCH" "origin/$TARGET"
          for sha in $picks; do
            if ! git cherry-pick -x "$sha"; then
              git cherry-pick --abort
              echo "::error::Cherry-pick of $sha conflicts on $TARGET. Either include the commits it depends on, or create the promotion branch locally, resolve, and push."
              exit 1
            fi
          done

          # Prod: pin the reused, staging-tested image into values-prod.yaml as one
          # extra commit (promotion-guard exempts it -- touches only values-prod.yaml).
          if [ "$TARGET" = "prod" ]; then
            yq -i '.image.tag = strenv(IMAGE_TAG)' helm/purrf/values-prod.yaml
            if ! git diff --quiet helm/purrf/values-prod.yaml; then
              git commit -am "chore(prod): pin image to ${IMAGE_TAG}"
            fi
          fi

          if [ "$(git rev-list --count "origin/$TARGET..$BRANCH")" -eq 0 ]; then
            echo "::error::Nothing to promote: $TARGET already contains all selected changes."
            exit 1
          fi
          git push origin "$BRANCH"

          {
            if [ "$TARGET" = "prod" ]; then
              echo "Releases \`$RELEASE_TAG\` from \`staging\` to \`prod\`, reusing the staging-tested image \`$IMAGE_TAG\`."
            else
              echo "Promotes the following commits from \`$UPSTREAM\` to \`$TARGET\`:"
            fi
            echo
            for sha in $(git rev-list --reverse "origin/$TARGET..$BRANCH"); do
              line="- $(git log -1 --format='%h %s' "$sha")"
              # First cherry-pick trailer = the original main commit; link its PR
              # so each released change traces back to the feature PR it came from.
              origin_sha=$(git log -1 --format=%B "$sha" \
                | grep -oE '\(cherry picked from commit [0-9a-f]{40}\)' \
                | head -1 | grep -oE '[0-9a-f]{40}' || true)
              if [ -n "$origin_sha" ]; then
                src_pr=$(gh api "repos/$REPO/commits/$origin_sha/pulls" --jq '.[0].number' 2>/dev/null || true)
                # Skip if the subject already carries this PR (squash-merge bakes
                # "(#N)" into the commit message), else it renders twice.
                if [ -n "$src_pr" ] && [ "$src_pr" != "null" ] \
                   && ! printf '%s' "$line" | grep -qF "(#$src_pr)"; then
                  line="$line (#$src_pr)"
                fi
              fi
              echo "$line"
            done
            echo
            echo "Created by promote.yml run ${{ github.run_id }}. Merge with a merge commit (never squash/rebase)."
          } > pr_body.md

          count=$(git rev-list --count "origin/$TARGET..$BRANCH")
          if [ "$TARGET" = "prod" ]; then
            title="Release $RELEASE_TAG to prod ($count commit(s), image $IMAGE_TAG)"
          else
            title="Promote $count commit(s) from $UPSTREAM to $TARGET"
          fi
          gh pr create \
            --base "$TARGET" \
            --head "$BRANCH" \
            --title "$title" \
            --body-file pr_body.md
