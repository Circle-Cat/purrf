name: Deploy Staging

# Continuous deploy to the staging environment. On every push to staging that
# touches the backend image, this builds the image FROM THE STAGING BRANCH,
# pushes it to GHCR, then opens a PR pinning the new tag into
# helm/purrf/values-staging.yaml.
#
# Why build from the branch (not build-once from main): main->staging is a
# selective cherry-pick, so staging's tree is a subset of main. An image built
# from main would contain un-promoted code. Building from staging guarantees the
# image is exactly what was promoted -- and that exact image is later reused for
# prod (prod never rebuilds), so "what you tested on staging is what ships".
#
# Why a PR (not a direct commit like deploy-test.yml): the staging ruleset has NO
# app bypass. The pin goes through a reviewed PR so a maintainer approves which
# image deploys. promotion-guard exempts this commit (it touches only
# values-staging.yaml). The purrf-staging ArgoCD Application watches that file
# and syncs once the PR merges.
on:
  push:
    branches: [staging]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'MODULE.bazel'
      - 'MODULE.bazel.lock'
      - 'BUILD'
      - 'py_layer.bzl'
      - '.bazelversion'
      - '.github/workflows/deploy-staging.yml'

# Only the newest staging commit's image matters; drop in-flight builds.
concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read    # checkout falls back to this; the app token does the push
  packages: write   # push the image to GHCR via the built-in token

jobs:
  build-and-pin:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      # App token so the pin PR is authored by the app (a distinct actor, so
      # presubmit runs on it) and the branch push authenticates as the app.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PURRF_BOT_APP_ID }}
          private-key: ${{ secrets.PURRF_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: bazel-contrib/setup-bazel@0.19.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        # TAG_1=staging is a mutable "latest on staging" pointer.
        # TAG_2=<sha> is the immutable per-build tag that values-staging.yaml pins
        # and that prod later reuses verbatim.
        run: >-
          bazel --max_idle_secs=10 run //:purrf_image_push_dynamic
          --action_env=BE_REPO=ghcr.io/circle-cat/purrf
          --action_env=TAG_1=staging
          --action_env=TAG_2=${{ github.sha }}

      - name: Open PR to pin image tag in values-staging.yaml
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ github.sha }}
          REPO: ${{ github.repository }}
          BRANCH: deploy-staging-pin/${{ github.sha }}
        run: |
          set -o errexit -o pipefail -o nounset
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Link the pin back to the promote PR whose merge into staging triggered
          # this build, so you can trace an image to the code (and PR) it ships.
          src_pr=$(gh api "repos/$REPO/commits/$TAG/pulls" --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$src_pr" ] && [ "$src_pr" != "null" ]; then
            src_ref="#$src_pr"
          else
            src_ref="staging@${TAG:0:9}"
          fi

          # Branch off the latest staging tip in case a merge landed during build.
          git fetch origin staging
          git checkout -B "$BRANCH" origin/staging
          yq -i '.image.tag = strenv(TAG)' helm/purrf/values-staging.yaml
          if git diff --quiet helm/purrf/values-staging.yaml; then
            echo "values-staging.yaml already pinned to ${TAG}; nothing to open."
            exit 0
          fi
          git commit -am "chore(staging): pin image to ${TAG} (from ${src_ref})"
          git push origin "$BRANCH"
          gh pr create \
            --base staging \
            --head "$BRANCH" \
            --label automation:image-pin \
            --title "Pin staging image to ${TAG} (from ${src_ref})" \
            --body "$(printf 'Auto-generated by deploy-staging.yml: pins the staging-built image into `values-staging.yaml`.\n\nImage built from the code merged in %s. Merge (merge commit) to deploy to staging via ArgoCD; the same image tag is reused verbatim when this batch is released to prod.' "$src_ref")"
