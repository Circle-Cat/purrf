name: Deploy Test

# Builds the backend image on every push to main and pushes it to GHCR under
# the mutable `main` tag (plus an immutable commit-SHA tag for traceability).
# ArgoCD Image Updater watches the `main` tag's digest and writes the new
# digest into helm/purrf/values-test.yaml, which the purrf-test ArgoCD
# Application syncs. This workflow itself never touches git or the values file.
on:
  push:
    branches: [main]
    # Only rebuild when something in the backend image actually changes.
    # Frontend is served from a CDN; tools/ and alembic are not in the image.
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'MODULE.bazel'
      - 'MODULE.bazel.lock'
      - 'BUILD'
      - 'py_layer.bzl'
      - '.bazelversion'
      - '.github/workflows/deploy-test.yml'

# Only the newest commit's image needs to reach test; drop in-flight builds.
concurrency:
  group: deploy-test
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.19.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        # TAG_1=main is the mutable tag ArgoCD Image Updater tracks by digest.
        # TAG_2=<sha> is an immutable per-build tag for traceability/rollback.
        run: >-
          bazel --max_idle_secs=10 run //:purrf_image_push_dynamic
          --action_env=BE_REPO=ghcr.io/circle-cat/purrf
          --action_env=TAG_1=main
          --action_env=TAG_2=${{ github.sha }}
  