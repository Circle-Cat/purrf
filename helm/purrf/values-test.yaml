# Test-environment overrides, layered on top of values.yaml.
# Read by the ArgoCD `purrf-test` Application via source.helm.valueFiles.
# These were previously injected by Terraform (module.purrf_instance.helm_release.purrf_app).
# Shared chart defaults (securityContext, cronjobs, resources, ...) stay in values.yaml.

fullnameOverride: purrf-test
image:
  # Public GHCR image. On every push to main, .github/workflows/deploy-test.yml
  # builds the image and commits the new commit-SHA into `tag` below (with
  # [skip ci]); the purrf-test ArgoCD Application syncs it. The "main" value
  # here is just the bootstrap before the first deploy-test run pins a SHA.
  repository: ghcr.io/circle-cat/purrf
  tag: "e260c132dd34136ea975cb73c34adfed2177dd5a"
envFrom:
  - secretRef:
      name: purrf-test
ingress:
  enabled: true
  className: cloudflare-tunnel
  hosts:
    - host: test-api.purrf.io
      paths:
        - path: /
          pathType: Prefix
