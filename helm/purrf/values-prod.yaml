# Prod-environment overrides, layered on top of values.yaml.
# Read by the ArgoCD `purrf-prod` Application via source.helm.valueFiles.
# These were previously injected by Terraform (module.purrf_instance.helm_release.purrf_app).
# Shared chart defaults (securityContext, cronjobs, resources, ...) stay in values.yaml.

fullnameOverride: purrf-prod
image:
  # CI-built image, promoted from staging (prod never rebuilds; the tag below
  # is pinned by the prod promotion to the staging-tested build).
  repository: ghcr.io/circle-cat/purrf
  tag: "7f039590bb4449ee16df7692cae2d9df3977a03a"
envFrom:
  - secretRef:
      name: purrf-prod
ingress:
  enabled: true
  className: cloudflare2-tunnel
  hosts:
    - host: api.purrf.io
      paths:
        - path: /
          pathType: Prefix
