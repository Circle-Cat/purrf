# Staging-environment overrides, layered on top of values.yaml.
# Read by the ArgoCD `purrf-staging` Application via source.helm.valueFiles.
# These were previously injected by Terraform (module.purrf_instance.helm_release.purrf_app).
# Shared chart defaults (securityContext, cronjobs, resources, ...) stay in values.yaml.

fullnameOverride: purrf-staging
image:
  # Kept on the current Terraform-built image (image path unchanged for now);
  # switching to the CI/GHCR image is a follow-up.
  repository: ghcr.io/circle-cat/purrf
  tag: "7f039590bb4449ee16df7692cae2d9df3977a03a"
envFrom:
  - secretRef:
      name: purrf-staging
ingress:
  enabled: true
  className: cloudflare2-tunnel
  hosts:
    - host: staging-api.purrf.io
      paths:
        - path: /
          pathType: Prefix
